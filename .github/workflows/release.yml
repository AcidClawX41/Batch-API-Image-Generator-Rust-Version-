name: Build & Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: xai-imagine-generator.exe
            name: xai-imagine-generator-windows.exe

          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: xai-imagine-generator
            name: xai-imagine-generator-linux

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: xai-imagine-generator
            name: xai-imagine-generator-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config \
            cmake

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/${{ matrix.artifact }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and upload with platform name
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact }}" "${{ matrix.name }}"
      
      - name: Upload renamed binary
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
